version: '3'

# Produção — Coolify
# O Coolify (Traefik) gerencia domínio, SSL e roteamento.
# Configure todas as variáveis de ambiente no painel do Coolify.
# Service principal: rails | Porta: 3000

services:
  rails:
    image: chatwoot/chatwoot:latest
    env_file: .env
    restart: always
    depends_on:
      - postgres
      - redis
    volumes:
      - chatwoot_storage:/app/storage
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    expose:
      - '3000'

  sidekiq:
    image: chatwoot/chatwoot:latest
    env_file: .env
    restart: always
    depends_on:
      - postgres
      - redis
    volumes:
      - chatwoot_storage:/app/storage
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

  postgres:
    image: pgvector/pgvector:pg15
    restart: always
    volumes:
      - chatwoot_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    image: redis:7-alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - chatwoot_redis:/data

volumes:
  chatwoot_storage:
  chatwoot_postgres:
  chatwoot_redis:
